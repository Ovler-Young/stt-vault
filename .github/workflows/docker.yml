name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ovler-young/stt-vault

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract CPU metadata
        id: meta-cpu
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=cpu,enable={{is_default_branch}}
            type=sha,prefix=cpu-sha-
            type=semver,pattern=cpu-{{version}}

      - name: Extract GPU metadata
        id: meta-gpu
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=gpu,enable={{is_default_branch}}
            type=sha,prefix=gpu-sha-
            type=semver,pattern=gpu-{{version}}

      - name: Build and push CPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: cpu
          push: true
          tags: ${{ steps.meta-cpu.outputs.tags }}
          labels: ${{ steps.meta-cpu.outputs.labels }}
          cache-from: type=gha,scope=stt-vault-cpu
          cache-to: type=gha,mode=max,scope=stt-vault-cpu

      - name: Build and push GPU image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: gpu
          push: true
          tags: ${{ steps.meta-gpu.outputs.tags }}
          labels: ${{ steps.meta-gpu.outputs.labels }}
          cache-from: type=gha,scope=stt-vault-gpu
          cache-to: type=gha,mode=max,scope=stt-vault-gpu

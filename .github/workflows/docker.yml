name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/ovler-young/stt-vault

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: CPU
            target: cpu
            cache_scope: stt-vault-cpu
            tags: |
              type=raw,value=latest,enable={{is_default_branch}}
              type=raw,value=cpu,enable={{is_default_branch}}
              type=sha,prefix=cpu-sha-
              type=semver,pattern=cpu-{{version}}
          - name: GPU
            target: gpu
            cache_scope: stt-vault-gpu
            tags: |
              type=raw,value=gpu,enable={{is_default_branch}}
              type=sha,prefix=gpu-sha-
              type=semver,pattern=gpu-{{version}}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract ${{ matrix.name }} metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: ${{ matrix.tags }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
